name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit + contract + integration + e2e + security tests
        run: pytest -q
      - name: Scenario package validation
        shell: bash
        run: |
          for s in scenarios/*/; do
            python -m agent_debugger.cli.main scenario test "$s"
          done

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Typecheck and build dashboard
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npx tsc --noEmit
          npm run build

  regression-gate-demo:
    # Dogfooding (§21): the repository gates reference-agent changes with its
    # own compare command. The hasty policy must trip the benchmark gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Run baseline and candidate, expect regression exit 10
        shell: bash
        run: |
          agent-debugger init ws
          cd ws
          agent-debugger scenario add ../scenarios/login-env-var
          agent-debugger agent add ../configs/agents/careful-reference.yaml
          agent-debugger agent add ../configs/agents/hasty-reference.yaml
          agent-debugger run webapp.login-env-var --agent careful-reference --seed 1
          agent-debugger run webapp.login-env-var --agent hasty-reference --seed 1
          CAREFUL=$(agent-debugger agent list | python -c "import sys,json;rows=json.load(sys.stdin);print([r['revision_id'] for r in rows if r['name']=='careful-reference'][0])")
          HASTY=$(agent-debugger agent list | python -c "import sys,json;rows=json.load(sys.stdin);print([r['revision_id'] for r in rows if r['name']=='hasty-reference'][0])")
          set +e
          agent-debugger --json compare --baseline "$CAREFUL" --candidate "$HASTY" --gate > regression.json
          CODE=$?
          set -e
          cat regression.json
          test "$CODE" -eq 10
      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: ws/regression.json
