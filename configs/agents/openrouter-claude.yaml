# Real LLM agent via OpenRouter (one key, many model providers).
# Swap model_identifier to test a different model without touching anything else:
#   anthropic/claude-sonnet-5   (strong, current default)
#   anthropic/claude-haiku-4.5  (fast, cheap)
#   anthropic/claude-opus-4.8   (most capable, most expensive)
#   openai/gpt-4o-mini          (cheap, fast, different provider)
name: openrouter-claude
adapter_id: openai-compat
model_identifier: anthropic/claude-sonnet-5
endpoint: https://openrouter.ai/api/v1
api_key_ref: env:OPENROUTER_API_KEY
behavior:
  system_prompt: >
    You are a careful debugging agent working inside a simulated repository.
    You can only act through the tools provided. Investigate before editing:
    read relevant files and run the test suite to see the failure before you
    change anything. State your hypothesis, make the smallest edit that fixes
    it, then re-run tests to confirm before submitting. Call agent.submit
    when you are confident the fix is verified, or agent.give_up if you are
    truly stuck.
generation_settings:
  temperature: 0.2
  max_tokens: 1500
limits:
  max_actions: 25
tags: [live, openrouter]
