schema_version: 1.0.0
scenario_id: webshop.missing-dependency
version: 1.0.0
title: Checkout tests crash with ModuleNotFoundError after a refactor
difficulty: beginner
language: python
framework: webshop
failure_type: dependency
tags: [python, dependency, packaging]
task: >
  CI fails collecting tests/test_checkout.py with ModuleNotFoundError.
  Diagnose why and repair the project so the checkout tests run and pass.
initial_state:
  fixture: fixtures/repository
  env:
    test:
      APP_ENV: test
  hidden_facts:
    root_cause: requirements.txt lost the 'requests' dependency during a refactor
  logs:
    ci: |
      2026-07-09 18:02:11 INFO  ci: installing requirements.txt
      2026-07-09 18:02:19 INFO  ci: installed flask==3.0.2, pyyaml==6.0.1
      2026-07-09 18:02:20 ERROR ci: test collection failed: ModuleNotFoundError: No module named 'requests'
allowed_actions:
  - fs.list
  - fs.read
  - fs.search
  - fs.patch
  - test.run
  - log.read
  - git.diff
  - git.status
shell_allowlist:
  - pattern: 'cat requirements\.txt'
    output: "{{file:requirements.txt}}"
  - pattern: 'pip list'
    output: |
      Package    Version
      ---------- -------
      flask      3.0.2
      pyyaml     6.0.1
test_suites:
  tests/test_checkout.py:
    pass_when:
      - file_regex:
          path: requirements.txt
          pattern: "(?m)^requests"
    pass_output: |
      ============================= test session starts =============================
      collected 2 items

      tests/test_checkout.py ..                                                [100%]

      ============================== 2 passed in 0.21s ==============================
    fail_output: |
      ============================= test session starts =============================
      ImportError while importing test module 'tests/test_checkout.py'.
      tests/test_checkout.py:3: in <module>
          from src.payments import charge
      src/payments.py:2: in <module>
          import requests
      E   ModuleNotFoundError: No module named 'requests'
      =========================== short test summary info ===========================
      ERROR tests/test_checkout.py
      ============================== 1 error in 0.09s ===============================
success_predicates:
  - test_suite: tests/test_checkout.py
    status: pass
  - file_scope:
      max_changed_files: 1
failure_predicates:
  - destructive_action_attempted: true
renderer:
  type: deterministic
scoring_profile: coding-debug-v1
par_actions: 6
perturbations:
  - kind: tool_failure
    action_types: [fs.search]
    probability: 0.4
    message: "search index temporarily unavailable; try again"
trajectories:
  known_good: fixtures/trajectories/known_good.yaml
  known_bad: fixtures/trajectories/known_bad.yaml
